<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For to you Pragati..❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Sparkles without Imgur */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.2;
    animation: sparkle 6s linear infinite;
}

@keyframes sparkle {
    from {background-position: 0 0;}
    to {background-position: 1000px 1000px;}
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1, h2, h3 {
    color: white;
}

button {
    padding: 12px 25px;
    margin: 15px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: white;
    color: #ff4d6d;
    position: relative;
}
.window.location.href{
    background: #ff4d6d;
    color: white;
}




.gallery {
    display: none;
    margin-top: 20px;
}

.media {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.gallery img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    margin: 15px;
    clip-path: path("M100 30 C100 0, 200 0, 200 80 C200 140, 100 200, 100 200 C100 200, 0 140, 0 80 C0 0, 100 0, 100 30 Z");
    border: 5px solid white;
    box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
}

.videoBox {
    margin-top: 20px;
}

.gallery video {
    width: 90%;
    max-width: 350px;

    border-radius: 20px;
    border: 6px solid white;
    box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
}

.message {
    margin-top: 25px;
    font-size: 1.5em;
    color: white;
    position: relative;
    z-index: 5;
}


/* Fade animation */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: all 1.2s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* Heart rain */
.heart {
    position: fixed;
    top: -10px;
    color: red;
    font-size: 20px;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="videoBox fade" id="videoFade">

<script>
let stage = 0;

function noClicked(btn) {
    if(stage === 0){
        document.getElementById("question").innerText = "Dont do plzz...😢";
        stage++;
    }
    else if(stage === 1){
        document.getElementById("question").innerText = "Are you really sure? 🥺";
        stage++;
    }
    else if(stage === 2){
        document.getElementById("question").innerText = "Why Pragati why r u not taking...😭😭";
        stage = 3;
        setTimeout(()=>{
            document.getElementById("question").innerText = "click yes....!!!!";
        },1500);
    }
    else {
        moveButton(btn);
    }
}

function moveButton(btn){
    btn.style.position = "absolute";
    let x = Math.random() * (window.innerWidth - btn.offsetWidth);
    let y = Math.random() * (window.innerHeight - btn.offsetHeight);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function yesClicked(){
    document.getElementById("mainBox").style.display = "none";
    document.getElementById("gallery").style.display = "block";
    document.getElementById("music").play();
    startHearts();
    typeMessage();
   

    setTimeout(()=>{
        document.getElementById("photoFade").classList.add("show");
    }, 500);

    setTimeout(()=>{
        document.getElementById("videoFade").classList.add("show");
        document.getElementById("loveVideo").play();
    }, 1500);
}

function startHearts(){
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (Math.random()*20 + 20) + "px";
        document.body.appendChild(heart);
        setTimeout(()=>{ heart.remove(); },5000);
    },300);
}

function typeMessage(){
    let text = "happy birthday dear Pragati too you🎂💖 app humesha kush raho kahi bhi raho kisi ke sat bhi raho meri blessing tumare sat hai 💫 tum bauth aage bado Again Happy birthday to u miss Pragati ";
    document.getElementById("typedMessage").style.color = "#ff4d6d";
    let i = 0;

    function typing(){
        if(i < text.length){
            document.getElementById("typedMessage").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 50);
        }
    }
    typing();
}


</script>
